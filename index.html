<!doctype html>

<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Navigation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Navbar */

        .navbar1 {
            background: #0a2472;
        }

        /* 3D Carousel */

        .coverflow-carousel {
            position: relative;
            width: 100%;
            max-width: 900px;
            height: 320px;
            margin: 25px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1400px;
        }

        .slide {
            position: absolute;
            width: 320px;
            height: 200px;
            transition: 0.6s;
        }

        .slide img {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        /* center */

        .active {
            transform: translateX(0) scale(1.2);
            z-index: 3;
        }

        /* left */

        .left {
            transform: translateX(-300px) rotateY(45deg) scale(0.85);
            opacity: 0.6;
            z-index: 2;
        }

        /* right */

        .right {
            transform: translateX(300px) rotateY(-45deg) scale(0.85);
            opacity: 0.6;
            z-index: 2;
        }

        /* Feature cards */

        .feature-cards {
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2);
        }

        @media (max-width:768px) {

            .coverflow-carousel {
                height: 260px;
            }

            .slide {
                width: 240px;
                height: 160px;
            }

            .left {
                transform: translateX(-180px) rotateY(40deg);
            }

            .right {
                transform: translateX(180px) rotateY(-40deg);
            }

        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-expand-lg navbar-dark navbar1">
        <div class="container-fluid">

            <a class="navbar-brand d-flex align-items-center text-white" href="#">
                <img src="./logooo1.png" width="35" height="35" class="rounded-circle">
                <span class="ms-2 fw-bold">Navin</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent"> <span class="navbar-toggler-icon"></span> </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">

                <ul class="navbar-nav ms-auto align-items-center">

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
                            Menu
                        </a>

                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li><a class="dropdown-item" href="#">Settings</a></li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </li>

                    <li class="nav-item ms-2">
                        <a class="nav-link text-white" href="#">About</a>
                    </li>

                </ul>

                <form class="d-flex ms-3">
                    <input class="form-control form-control-sm" type="search" placeholder="Search">
                </form>

                <div class="ms-3">
                    <a href="index2.html" class="btn btn-light btn-sm" style="background:#ADD8E6;">
                        Login
                    </a>
                </div>

            </div>
        </div>
    </nav>

    <!-- 3D Carousel -->

    <div class="coverflow-carousel">

        <div class="slide">
            <img src="./scanqr.png">
        </div>

        <div class="slide">
            <img src="./shortestpath.png">
        </div>

        <div class="slide">
            <img src="./findlabs.png">
        </div>

        <div class="slide">
            <img src="./roomupdates.png">
        </div>

        <div class="slide">
            <img src="./facultydirectory.png">
        </div>

    </div>

    <!-- Feature Section -->

    <div class="d-flex justify-content-center feature-cards">

        <div class="card" style="width:18rem;">
            <img src="image.png" class="card-img-top">
        </div>

        <div class="card" style="width:18rem;">
            <img src="c2.png" class="card-img-top">
        </div>

        <div class="card" style="width:18rem;">
            <img src="c3.png" class="card-img-top">
        </div>

        <div class="card" style="width:18rem;">
            <img src="c4.png" class="card-img-top">
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const slides = document.querySelectorAll(".slide");
        let index = 0;

        function updateSlides() {

            slides.forEach(slide => {
                slide.classList.remove("active", "left", "right");
            });

            slides[index].classList.add("active");

            let left = (index - 1 + slides.length) % slides.length;
            let right = (index + 1) % slides.length;

            slides[left].classList.add("left");
            slides[right].classList.add("right");

        }

        setInterval(() => {
            index = (index + 1) % slides.length;
            updateSlides();
        }, 3000);

        updateSlides();

    </script>

</body>

</html>
