<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e8eefc, #f3f1ff, #eaf6ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Segoe UI;
        }

        .login-card {
            width: 380px;
            padding: 35px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .login-title {
            color: #0a2472;
            font-weight: 600;
        }

        .btn-login {
            background: #0a2472;
            border: none;
        }

        .btn-login:hover {
            background: #081c5c;
        }

        .form-control:focus {
            border-color: #0a2472;
            box-shadow: 0 0 0 .15rem rgba(10, 36, 114, .25);
        }
    </style>
</head>

<body>

    <div class="login-card">

        <h3 class="text-center login-title mb-4">Admin Login</h3>

        <form>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="Enter email">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password">
            </div>

            <div class="d-grid">
                <button class="btn btn-login text-white">Login</button>
            </div>

            <div class="text-center mt-3">
                <a href="#" style="color:#0a2472;text-decoration:none;">Forgot password?</a>
            </div>

        </form>

    </div>

</body>

</html>
