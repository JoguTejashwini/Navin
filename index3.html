<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Carousel</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .carousel {
      position: relative;
      width: 800px;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .slide {
      position: absolute;
      width: 300px;
      height: 200px;
      transition: 0.5s;
    }

    .slide img {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      object-fit: cover;
    }

    /* center */
    .active {
      transform: translateX(0) scale(1.2);
      z-index: 3;
    }

    /* left */
    .left {
      transform: translateX(-250px) rotateY(40deg);
      opacity: 0.6;
      z-index: 2;
    }

    /* right */
    .right {
      transform: translateX(250px) rotateY(-40deg);
      opacity: 0.6;
      z-index: 2;
    }
  </style>

</head>

<body>

  <div class="carousel">

    <div class="slide">
      <img src="https://picsum.photos/id/1015/600/400">
    </div>

    <div class="slide">
      <img src="https://picsum.photos/id/1016/600/400">
    </div>

    <div class="slide">
      <img src="https://picsum.photos/id/1018/600/400">
    </div>

    <div class="slide">
      <img src="https://picsum.photos/id/1020/600/400">
    </div>

  </div>

  <script>

    const slides = document.querySelectorAll(".slide");
    let index = 0;

    function updateSlides() {

      slides.forEach(slide => {
        slide.classList.remove("active", "left", "right");
      });

      slides[index].classList.add("active");

      let left = (index - 1 + slides.length) % slides.length;
      let right = (index + 1) % slides.length;

      slides[left].classList.add("left");
      slides[right].classList.add("right");

    }

    setInterval(() => {
      index = (index + 1) % slides.length;
      updateSlides();
    }, 3000);

    updateSlides();

  </script>

</body>

</html>
