<!DOCTYPE html>
<html>

<head>
    <title>Indoor Navigation</title>

    <!-- OFFLINE LEAFLET -->
    <link rel="stylesheet" href="leaflet/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f3;
        }

        .navbar {
            background: #0a2472;
            color: white;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .search-container {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            z-index: 9999;
        }

        .search-box {
            width: 100%;
            padding: 14px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
        }

        .dropdown {
            position: absolute;
            top: 55px;
            width: 100%;
            background: white;
            border-radius: 10px;
            display: none;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
            z-index: 99999;
        }

        .dropdown div {
            padding: 12px;
            cursor: pointer;
        }

        .dropdown div:hover {
            background: #f0f0f0;
        }

        #map {
            height: calc(100vh - 60px);
        }

        .bottom-panel {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }

        .panel-content {
            padding: 15px;
            text-align: center;
        }

        .panel-content button {
            padding: 10px 25px;
            background: #0a2472;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="navbar">Indoor Navigation</div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search destination..."
            onfocus="showAllLocations()" oninput="filterLocations()">

        <div id="dropdown" class="dropdown"></div>
    </div>

    <div id="map"></div>

    <div class="bottom-panel">
        <div class="panel-content">
            <h3 id="placeName">Select a destination</h3>
            <button onclick="startNavigation()">Start Navigation</button>
        </div>
    </div>

    <!-- OFFLINE LEAFLET -->
    <script src="leaflet/leaflet.js"></script>

    <script>

        // 🟢 MAP
        let map = L.map('map', { zoomControl: false }).setView([0, 0], 20);
        let bounds = [[0, 0], [100, 100]];
        L.imageOverlay('images/map.png', bounds).addTo(map);
        map.fitBounds(bounds);

        // 🟢 LOCATIONS
        let locations = [
            { id: "A", name: "Entrance" },
            { id: "B", name: "Hallway" },
            { id: "C", name: "Room 101" },
            { id: "D", name: "Cafeteria" }
        ];

        let names = {
            A: "Entrance",
            B: "Hallway",
            C: "Room 101",
            D: "Cafeteria"
        };

        // 🟢 SEARCH
        function showAllLocations() {
            renderDropdown(locations);
        }

        function filterLocations() {
            let input = document.getElementById("searchInput").value.toLowerCase();

            let filtered = locations.filter(loc =>
                loc.name.toLowerCase().includes(input)
            );

            if (input === "") filtered = locations;

            renderDropdown(filtered);
        }

        function renderDropdown(list) {
            let dropdown = document.getElementById("dropdown");
            dropdown.innerHTML = "";

            list.forEach(loc => {
                let div = document.createElement("div");
                div.innerText = loc.name;
                div.onclick = () => selectLocation(loc.id);
                dropdown.appendChild(div);
            });

            dropdown.style.display = "block";
        }

        document.addEventListener("click", function (e) {
            if (!e.target.closest(".search-container")) {
                document.getElementById("dropdown").style.display = "none";
            }
        });

        // 🟢 GRAPH
        let nodes = {
            A: [10, 10],
            B: [50, 10],
            C: [90, 10],
            D: [50, 80]
        };

        let graph = {
            A: { B: 40 },
            B: { A: 40, C: 40, D: 70 },
            C: { B: 40 },
            D: { B: 70 }
        };

        // 🟢 QR START
        let urlParams = new URLSearchParams(window.location.search);
        let startNode = urlParams.get("start") || "A";

        // 🟢 VARIABLES
        let selectedNode = null;
        let routeLine, startMarker, endMarker;

        // 🟢 SELECT LOCATION
        function selectLocation(node) {
            selectedNode = node;
            document.getElementById("searchInput").value = names[node];
            document.getElementById("dropdown").style.display = "none";
            document.getElementById("placeName").innerText = names[node];
        }

        // 🟢 NAVIGATION
        function startNavigation() {

            if (!selectedNode) {
                alert("Select destination first");
                return;
            }

            let path = dijkstra(startNode, selectedNode);
            let coords = path.map(n => nodes[n]);

            if (routeLine) map.removeLayer(routeLine);

            routeLine = L.polyline(coords, {
                color: "green",
                weight: 6
            }).addTo(map);

            if (startMarker) map.removeLayer(startMarker);
            if (endMarker) map.removeLayer(endMarker);

            // 🔴 START
            startMarker = L.marker(nodes[startNode], {
                icon: L.icon({
                    iconUrl: 'images/red.png',
                    iconSize: [32, 32]
                })
            }).addTo(map);

            // 🔵 DESTINATION
            endMarker = L.marker(nodes[selectedNode], {
                icon: L.icon({
                    iconUrl: 'images/blue.png',
                    iconSize: [32, 32]
                })
            }).addTo(map);

            map.fitBounds(routeLine.getBounds());
        }

        // 🟢 DIJKSTRA
        function dijkstra(start, end) {
            let dist = {}, prev = {}, pq = [];

            for (let n in graph) dist[n] = Infinity;

            dist[start] = 0;
            pq.push({ node: start, d: 0 });

            while (pq.length) {
                pq.sort((a, b) => a.d - b.d);
                let { node } = pq.shift();

                for (let nb in graph[node]) {
                    let newD = dist[node] + graph[node][nb];
                    if (newD < dist[nb]) {
                        dist[nb] = newD;
                        prev[nb] = node;
                        pq.push({ node: nb, d: newD });
                    }
                }
            }

            let path = [];
            let curr = end;

            while (curr) {
                path.unshift(curr);
                curr = prev[curr];
            }

            return path;
        }

    </script>

</body>

</html>
